<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Neon Einmaleins</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../style.css">
  <style>
    /* ── Leaderboard ───────────────────────────────────── */
    .leaderboard {
      margin-top: 2rem;
      width: 100%;
      max-width: 360px;
    }
    .leaderboard__tabs {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1rem;
      justify-content: center;
    }
    .lb-tab {
      background: transparent;
      border: 1px solid var(--text-muted, #666);
      color: var(--text-muted, #666);
      padding: 0.25rem 0.75rem;
      border-radius: 99px;
      font-size: 0.78rem;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.15s;
    }
    .lb-tab.active {
      background: var(--accent, #fff);
      border-color: var(--accent, #fff);
      color: var(--bg, #000);
    }
    .leaderboard__list {
      list-style: none;
      padding: 0;
      margin: 0;
    }
    .leaderboard__list li {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.4rem 0;
      border-bottom: 1px solid rgba(255,255,255,0.07);
      font-size: 0.88rem;
    }
    .leaderboard__list li:last-child { border-bottom: none; }
    .lb-rank {
      width: 1.6rem;
      text-align: right;
      color: var(--text-muted, #666);
      font-size: 0.75rem;
    }
    .lb-rank.gold   { color: #ffd700; font-weight: 700; }
    .lb-rank.silver { color: #c0c0c0; font-weight: 700; }
    .lb-rank.bronze { color: #cd7f32; font-weight: 700; }
    .lb-name  { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .lb-score { font-weight: 700; }
    .lb-me    { color: var(--accent, #fff); }
    .leaderboard__empty {
      text-align: center;
      color: var(--text-muted, #666);
      font-size: 0.85rem;
      padding: 1rem 0;
    }
    .lb-loading { text-align: center; color: var(--text-muted, #666); font-size: 0.8rem; }
  </style>
</head>
<body>

  <!-- ── Game iframe ───────────── -->
  <div class="game-frame" id="gameFrame" style="display: block; width: 100vw; height: 100vh;">
    <iframe
      id="gameIframe"
      src="./game/"
      title="Neon Einmaleins"
      allow="fullscreen"
      style="width: 100%; height: 100%; border: none;"
    ></iframe>
  </div>

  <script>
    // The React game inside ./game/ now handles all name input and highscores natively.
    // This wrapper simply hosts the game iframe in fullscreen.
  </script>

</body>
</html>
