<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bruchrechnen Meister — CODECHO Games</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../style.css">
</head>
<body>

  <!-- ── Step 1: Name input ─────────────── -->
  <div class="name-screen" id="nameScreen">
    <div class="name-box">
      <p class="name-box__num">01 — BRUCHRECHNEN MEISTER</p>
      <h2>Wie heißt du?</h2>
      <p id="classHint">Dein Lehrer sieht dein Ergebnis.</p>

      <input
        type="text"
        id="nameInput"
        placeholder="Dein Vorname"
        maxlength="40"
        autocomplete="off"
        autofocus
      >
      <button class="btn" id="startBtn">Spielen →</button>
    </div>
  </div>

  <!-- ── Step 2: Game iframe ────────────── -->
  <div class="game-frame" id="gameFrame">
    <iframe
      id="gameIframe"
      src=""
      title="Bruchrechnen Meister"
      allow="fullscreen"
    ></iframe>
  </div>

  <!-- ── Step 3: Score screen ──────────── -->
  <div class="score-screen" id="scoreScreen">
    <div class="score-box">
      <div class="score-box__emoji">🏆</div>
      <h2 id="scoreTitle">Gut gespielt!</h2>
      <p id="scoreName"></p>
      <div class="score-big" id="scoreBig">—</div>
      <p id="scoreDetail"></p>
      <p id="saveStatus" class="score-saved" style="display:none"></p>
      <p id="saveError" class="score-error" style="display:none"></p>
      <a href="../" style="display:block; margin-top:2rem; color: var(--text-muted); font-size:0.85rem;">
        ← Zurück zur Spieleübersicht
      </a>
    </div>
  </div>

  <script>
    // ── Config ────────────────────────────
    const SUPABASE_URL  = 'YOUR_SUPABASE_URL';
    const SUPABASE_KEY  = 'YOUR_SUPABASE_ANON_KEY';
    const GAME_ORIGIN   = 'https://bruchrechnen-meister-248296775029.us-west1.run.app';
    const GAME_NAME     = 'bruchrechnen-meister';

    // ── Read URL params ───────────────────
    const params     = new URLSearchParams(window.location.search);
    const classCode  = params.get('class') || '';
    const urlName    = params.get('name')  || '';

    if (urlName) {
      document.getElementById('nameInput').value = urlName;
    }

    if (classCode) {
      document.getElementById('classHint').textContent =
        `Klasse: ${classCode} — Dein Lehrer sieht dein Ergebnis.`;
    } else {
      document.getElementById('classHint').textContent =
        'Kein Klassencode — Ergebnis wird nicht gespeichert.';
    }

    // ── Start game ────────────────────────
    document.getElementById('startBtn').addEventListener('click', startGame);
    document.getElementById('nameInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') startGame();
    });

    function startGame() {
      const name = document.getElementById('nameInput').value.trim();
      if (!name) { document.getElementById('nameInput').focus(); return; }
      window._playerName = name;
      document.getElementById('nameScreen').style.display = 'none';
      const frame = document.getElementById('gameFrame');
      frame.style.display = 'block';
      document.getElementById('gameIframe').src = GAME_ORIGIN;
    }

    // ── Listen for postMessage from Cloud Run game ─────
    window.addEventListener('message', async function(event) {
      if (event.origin !== GAME_ORIGIN) return;
      if (!event.data || event.data.type !== 'MATH_GAME_OVER') return;

      const { score, highScore, level } = event.data;
      const name = window._playerName || urlName || '?';

      document.getElementById('gameFrame').style.display = 'none';
      const ss = document.getElementById('scoreScreen');
      ss.style.display = 'flex';

      document.getElementById('scoreName').textContent  = name;
      document.getElementById('scoreBig').textContent   = score ?? '—';
      document.getElementById('scoreDetail').textContent =
        highScore != null ? `Highscore: ${highScore}` : '';

      if (classCode && SUPABASE_URL !== 'YOUR_SUPABASE_URL') {
        try {
          const res = await fetch(`${SUPABASE_URL}/rest/v1/scores`, {
            method: 'POST',
            headers: {
              'apikey': SUPABASE_KEY,
              'Authorization': `Bearer ${SUPABASE_KEY}`,
              'Content-Type': 'application/json',
              'Prefer': 'return=minimal'
            },
            body: JSON.stringify({
              class_code:   classCode,
              student_name: name,
              game:         GAME_NAME,
              score:        score     ?? 0,
              high_score:   highScore ?? 0,
              level:        String(level ?? '')
            })
          });
          if (res.ok) {
            const el = document.getElementById('saveStatus');
            el.textContent = '✓ Ergebnis gespeichert';
            el.style.display = 'block';
          } else throw new Error(`HTTP ${res.status}`);
        } catch (err) {
          const el = document.getElementById('saveError');
          el.textContent = 'Ergebnis konnte nicht gespeichert werden.';
          el.style.display = 'block';
          console.error('Score save failed:', err);
        }
      }
    });
  </script>

</body>
</html>
