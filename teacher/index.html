<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lehrer-Dashboard — CODECHO Games</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../style.css">
</head>
<body>

  <nav class="nav">
    <a href="../" class="nav-home">← Games</a>
    <button class="nav-teacher" id="logoutBtn" style="display:none;cursor:pointer;background:none;">
      Abmelden
    </button>
  </nav>

  <!-- ── Login ─────────────────────────── -->
  <div class="teacher-wrap" id="loginView">
    <h1>Lehrer-Login</h1>
    <p class="sub">Nur für Lehrkräfte. Ergebnisse deiner Klassen im Überblick.</p>

    <form class="login-form" id="loginForm">
      <label for="emailInput">E-Mail</label>
      <input type="email" id="emailInput" placeholder="deine@schule.de" required>

      <label for="passwordInput">Passwort</label>
      <input type="password" id="passwordInput" placeholder="••••••••" required>

      <button type="submit" class="btn" id="loginBtn">Anmelden →</button>
      <p id="loginError" style="color:#f87171;font-size:0.85rem;margin-top:0.75rem;display:none;"></p>
    </form>
  </div>

  <!-- ── Dashboard ─────────────────────── -->
  <div class="teacher-wrap" id="dashboardView" style="display:none;">
    <div class="scores-header">
      <div>
        <h1>Ergebnisse</h1>
        <p class="sub" id="teacherEmail"></p>
      </div>
      <div style="display:flex;gap:0.75rem;align-items:center;">
        <select id="filterClass" style="
          background: var(--bg-elevated);
          border: 1px solid var(--border);
          border-radius: 6px;
          color: var(--text);
          font-family: var(--font);
          font-size: 0.8rem;
          padding: 0.375rem 0.75rem;
          cursor: pointer;
          outline: none;
        ">
          <option value="">Alle Klassen</option>
        </select>
        <button class="btn-sm" id="refreshBtn">↻ Aktualisieren</button>
      </div>
    </div>

    <div id="scoresContainer">
      <div class="empty-state">Lade Ergebnisse…</div>
    </div>
  </div>

  <script>
    // ── Config ────────────────────────────
    const SUPABASE_URL  = 'YOUR_SUPABASE_URL';
    const SUPABASE_KEY  = 'YOUR_SUPABASE_ANON_KEY';

    // ── Auth helpers ──────────────────────
    let accessToken = null;

    async function signIn(email, password) {
      const res = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=password`, {
        method: 'POST',
        headers: {
          'apikey': SUPABASE_KEY,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({ email, password })
      });
      if (!res.ok) {
        const err = await res.json();
        throw new Error(err.error_description || 'Login fehlgeschlagen');
      }
      return res.json();
    }

    async function signOut() {
      if (!accessToken) return;
      await fetch(`${SUPABASE_URL}/auth/v1/logout`, {
        method: 'POST',
        headers: {
          'apikey': SUPABASE_KEY,
          'Authorization': `Bearer ${accessToken}`
        }
      });
    }

    async function fetchScores(classFilter) {
      let url = `${SUPABASE_URL}/rest/v1/scores?select=*&order=played_at.desc`;
      if (classFilter) url += `&class_code=eq.${encodeURIComponent(classFilter)}`;

      const res = await fetch(url, {
        headers: {
          'apikey': SUPABASE_KEY,
          'Authorization': `Bearer ${accessToken}`
        }
      });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      return res.json();
    }

    async function fetchClasses() {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/classes?select=id,name&order=created_at.desc`, {
        headers: {
          'apikey': SUPABASE_KEY,
          'Authorization': `Bearer ${accessToken}`
        }
      });
      if (!res.ok) return [];
      return res.json();
    }

    // ── Render ───────────────────────────
    function renderScores(scores) {
      const container = document.getElementById('scoresContainer');
      if (!scores.length) {
        container.innerHTML = '<div class="empty-state">Noch keine Ergebnisse für diese Klasse.</div>';
        return;
      }

      const rows = scores.map(s => {
        const date = new Date(s.played_at).toLocaleDateString('de-DE', {
          day: '2-digit', month: '2-digit', year: '2-digit',
          hour: '2-digit', minute: '2-digit'
        });
        const badge = s.game === 'neon-einmaleins'
          ? '<span class="badge badge--neon">Neon</span>'
          : '<span class="badge badge--bruch">Bruch</span>';
        return `
          <tr>
            <td>${s.student_name}</td>
            <td>${badge}</td>
            <td>${s.class_code}</td>
            <td><strong>${s.score}</strong></td>
            <td>${s.high_score ?? '—'}</td>
            <td>${s.level ?? '—'}</td>
            <td style="color:var(--text-muted)">${date}</td>
          </tr>`;
      }).join('');

      container.innerHTML = `
        <table class="scores-table">
          <thead>
            <tr>
              <th>Schüler:in</th>
              <th>Spiel</th>
              <th>Klasse</th>
              <th>Punkte</th>
              <th>Highscore</th>
              <th>Level</th>
              <th>Zeitpunkt</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>`;
    }

    async function loadDashboard() {
      const classFilter = document.getElementById('filterClass').value;
      try {
        const [scores, classes] = await Promise.all([
          fetchScores(classFilter),
          fetchClasses()
        ]);

        // Populate class filter
        const sel = document.getElementById('filterClass');
        const current = sel.value;
        sel.innerHTML = '<option value="">Alle Klassen</option>' +
          classes.map(c => `<option value="${c.id}">${c.name || c.id}</option>`).join('');
        sel.value = current;

        renderScores(scores);
      } catch (err) {
        document.getElementById('scoresContainer').innerHTML =
          `<div class="empty-state">Fehler beim Laden: ${err.message}</div>`;
      }
    }

    // ── Login form ────────────────────────
    document.getElementById('loginForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      const btn = document.getElementById('loginBtn');
      const errEl = document.getElementById('loginError');
      btn.disabled = true;
      btn.textContent = '…';
      errEl.style.display = 'none';

      try {
        const email    = document.getElementById('emailInput').value;
        const password = document.getElementById('passwordInput').value;
        const data = await signIn(email, password);
        accessToken = data.access_token;

        document.getElementById('loginView').style.display = 'none';
        document.getElementById('dashboardView').style.display = 'block';
        document.getElementById('logoutBtn').style.display = 'inline-block';
        document.getElementById('teacherEmail').textContent = email;

        await loadDashboard();
      } catch (err) {
        errEl.textContent = err.message;
        errEl.style.display = 'block';
      } finally {
        btn.disabled = false;
        btn.textContent = 'Anmelden →';
      }
    });

    document.getElementById('logoutBtn').addEventListener('click', async function() {
      await signOut();
      accessToken = null;
      document.getElementById('dashboardView').style.display = 'none';
      document.getElementById('loginView').style.display = 'block';
      document.getElementById('logoutBtn').style.display = 'none';
    });

    document.getElementById('refreshBtn').addEventListener('click', loadDashboard);
    document.getElementById('filterClass').addEventListener('change', loadDashboard);
  </script>

</body>
</html>
